<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقات تهنئة عيد الفطر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;700&display=swap" rel="stylesheet">

<style>

body{
font-family:"Cairo",sans-serif;
text-align:center;
background-image:url("bg.jpg");
background-size:cover;
background-position:left top;
background-repeat:no-repeat;
margin:0;
padding:0;
color:#ffffff;
}

.overlay{
min-height:100vh;
padding:40px 20px;
}

/* العنوان */

h1{
margin-bottom:10px;
font-size:36px;
color:#ffffff;
text-shadow:0 2px 10px rgba(0,0,0,0.35);
line-height:1.3;
}

.sub-title{
font-size:22px;
font-weight:300;
display:block;
margin-top:6px;
}

p{
margin-bottom:25px;
font-size:18px;
color:#ffffff;
text-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* البطاقات */

.cards{
display:grid;
grid-template-columns:repeat(3,180px);
gap:20px;
justify-content:center;
margin:auto;
}

.cards img{
width:180px;
border-radius:12px;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,0.18);
border:3px solid transparent;
transition:0.2s;
}

.cards img:hover{
transform:scale(1.05);
}

.cards img.selected{
border-color:#15803d;
}

/* صندوق الإدخال */

.editor{
display:none;
margin:35px auto 0;
max-width:600px;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(6px);
padding:24px;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

.control-box{
background:#f8fafc;
border:1px solid #e5e7eb;
border-radius:14px;
padding:14px;
text-align:right;
}

.control-box label{
display:block;
margin-bottom:8px;
font-weight:700;
color:#1f2937;
}

input{
width:100%;
padding:12px;
font-size:17px;
border-radius:10px;
border:1px solid #d1d5db;
font-family:"Cairo",sans-serif;
box-sizing:border-box;
color:#1f2937;
}

/* الأزرار */

.buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button,
.download-btn{
padding:12px 22px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-family:"Cairo",sans-serif;
text-decoration:none;
}

.primary-btn{
background:#15803d;
color:white;
}

.primary-btn:hover{
background:#166534;
}

.secondary-btn{
background:#0f766e;
color:white;
}

.secondary-btn:hover{
background:#115e59;
}

/* المعاينة */

.result{
display:none;
margin-top:30px;
}

.result img{
max-width:420px;
width:100%;
border-radius:16px;
box-shadow:0 10px 26px rgba(0,0,0,0.16);
margin-bottom:16px;
background:white;
}

canvas{
display:none;
}

/* الموبايل */

@media(max-width:700px){

.cards{
grid-template-columns:repeat(2,160px);
}

.cards img{
width:160px;
}

h1{
font-size:28px;
}

.sub-title{
font-size:18px;
}

p{
font-size:16px;
}

}

@media(max-width:420px){

.cards{
grid-template-columns:160px;
}

}

</style>
</head>

<body>

<div class="overlay">

<h1>
بطاقات تهنئة عيد الفطر
<span class="sub-title">لمنسوبي شركة زمام القوة</span>
</h1>

<p>اختر البطاقة ثم اكتب اسمك</p>

<div class="cards">

<img src="card1.jpg" onclick="selectCard(this)">
<img src="card2.jpg" onclick="selectCard(this)">
<img src="card3.jpg" onclick="selectCard(this)">
<img src="card4.jpg" onclick="selectCard(this)">
<img src="card5.jpg" onclick="selectCard(this)">
<img src="card6.jpg" onclick="selectCard(this)">

</div>

<div class="editor" id="editor">

<div class="control-box">

<label>اسم الموظف</label>
<input id="nameInput" placeholder="اكتب اسمك هنا">

</div>

<div class="buttons">

<button class="primary-btn" onclick="generateCard()">إنشاء البطاقة</button>

<a id="downloadLink" class="download-btn secondary-btn" download="eid-card.png" style="display:none;">
تنزيل البطاقة
</a>

</div>

<div class="result" id="result">

<img id="previewImage">

</div>

</div>

</div>

<canvas id="canvas"></canvas>

<script>

let selectedCard="";

function selectCard(img){

selectedCard=img.getAttribute("src");

document.querySelectorAll(".cards img").forEach(function(card){
card.classList.remove("selected");
});

img.classList.add("selected");

document.getElementById("editor").style.display="block";

}

function generateCard(){

if(selectedCard===""){
alert("اختر بطاقة أولاً");
return;
}

let name=document.getElementById("nameInput").value.trim();

if(name===""){
alert("اكتب اسمك أولاً");
return;
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let img=new Image();

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let fontSize=canvas.width*0.045;

ctx.font="300 "+fontSize+"px Cairo";
ctx.fillStyle="#ffffff";
ctx.textAlign="center";

let x=canvas.width*0.5;
let y=canvas.height*0.85;

ctx.fillText(name,x,y);

let finalImage=canvas.toDataURL("image/png");

document.getElementById("previewImage").src=finalImage;
document.getElementById("downloadLink").href=finalImage;

document.getElementById("result").style.display="block";
document.getElementById("downloadLink").style.display="inline-block";

};

img.src=selectedCard;

}

</script>

</body>
</html>
